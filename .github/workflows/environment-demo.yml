name: environment-demo

on:
  workflow_dispatch:
    inputs:
      environments:
        type: environment
        description: "which environment?"
        required: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "🏗️ Build completed"
  Test:
    runs-on: ubuntu-latest
    needs: build
    environment: Test
    steps:
      - run: echo ${{ vars.SERVICE_ACCOUNT_NAME }} ; echo ${{ secrets.SERVICE_ACCOUNT_PASSWORD }}
      - if: ${{ inputs.environments == 'test' }}
        run: echo "🔍 Special steps for selected environment ${{ inputs.environments }}" >> $GITHUB_STEP_SUMMARY

  Dev:
    runs-on: ubuntu-latest
    needs: build
    environment: Dev
    steps:
      - run: echo ${{ vars.SERVICE_ACCOUNT_NAME }} ; echo ${{ secrets.SERVICE_ACCOUNT_PASSWORD }}
      - if: ${{ inputs.environments == 'dev' }}
        run: echo "🔍 Special steps for selected environment ${{ inputs.environments }}" >> $GITHUB_STEP_SUMMARY      
  Prod:
    runs-on: ubuntu-latest
    needs: [Dev, Test]
    environment: Prod
    steps:
      - run: echo ${{ vars.SERVICE_ACCOUNT_NAME }} ; echo ${{ secrets.SERVICE_ACCOUNT_PASSWORD }}
      - if: ${{ inputs.environments == 'production' }}
        run: echo "🔍 Special steps for selected environment ${{ inputs.environments }}" >> $GITHUB_STEP_SUMMARY
