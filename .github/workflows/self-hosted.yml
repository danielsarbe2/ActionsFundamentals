name: Self-hosted test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - name: Verify runner
        run: |
          echo "Hostname: $(hostname)"
          echo "User: $(whoami)"
          echo "macOS: $(sw_vers -productVersion)"
          echo "Arch: $(uname -m)"
          echo "Java: $(java -version 2>&1 | head -1)"
